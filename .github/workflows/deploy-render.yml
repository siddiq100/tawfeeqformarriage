name: Deploy to Render

on:
  push:
    branches: [ main, render-ready ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deployment
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
            echo "Missing required GitHub Secrets: RENDER_SERVICE_ID and/or RENDER_API_KEY"
            exit 1
          fi

          if [[ "$RENDER_SERVICE_ID" != srv-* ]]; then
            echo "RENDER_SERVICE_ID should start with 'srv-'"
            exit 1
          fi

          echo "Triggering Render deploy for $RENDER_SERVICE_ID"
          curl -X POST "https://api.render.com/deploy/$RENDER_SERVICE_ID" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
