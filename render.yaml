services:
  - type: web
    name: tawfeeq-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        value: https://tawfeeq-client.onrender.com
      - key: CORS_ORIGIN
        value: https://tawfeeq-client.onrender.com

  - type: static
    name: tawfeeq-client
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://tawfeeq-server.onrender.com

databases:
  - name: tawfeeq-mongodb
    databaseName: tawfeeq
    plan: free
