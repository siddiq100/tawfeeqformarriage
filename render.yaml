services:
  - type: web
    name: tawfeeq-server
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLIENT_URL
        value: https://tawfeeq-server.onrender.com
      - key: CORS_ORIGIN
        value: https://tawfeeq-server.onrender.com

databases:
  - name: tawfeeq-mongodb
    databaseName: tawfeeq
    plan: free
