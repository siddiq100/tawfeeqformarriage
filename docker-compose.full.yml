version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: tawfeeq-mongodb
    environment:
      MONGO_INITDB_DATABASE: tawfeeq
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password123}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - tawfeeq-network

  server:
    build:
      context: .
      dockerfile: server.Dockerfile
    container_name: tawfeeq-server
    environment:
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password123}@mongodb:27017/tawfeeq?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      CLIENT_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - tawfeeq-network

  client:
    build:
      context: .
      dockerfile: client.Dockerfile
    container_name: tawfeeq-client
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - tawfeeq-network

volumes:
  mongodb_data:

networks:
  tawfeeq-network:
    driver: bridge
