<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>اتصل بنا - توفيق</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script type="module" src="assets/js/app.js" defer></script>
</head>
<body>
  <header class="site-header"><h1>اتصل بنا</h1></header>
  <main class="container">
    <form id="contactForm" class="form">
      <label>الاسم<input name="name" required></label>
      <label>البريد<input type="email" name="email" required></label>
      <label>الموضوع<input name="subject" required></label>
      <label>الرسالة<textarea name="message" required></textarea></label>
      <button class="btn" type="submit">إرسال</button>
    </form>
    <div id="contactMessage" class="message"></div>
  </main>
  <footer class="site-footer"><p>© 2026 توفيق</p></footer>
</body>
</html>
